<?xml version="1.0" encoding="UTF-8"?>
<!-- Govena Logo — Full Horizontal — Light Version -->
<!-- Usage: white (#FFFFFF) and soft grey (#F1F2F6) backgrounds -->
<svg width="300" height="76" viewBox="0 0 300 76" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="shieldGrad" x1="24" y1="4" x2="24" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6C5CE7"/>
      <stop offset="100%" stop-color="#5849C9"/>
    </linearGradient>
  </defs>
  <!-- Shield: native 48×48, scaled 1.5×, centred vertically in 76px canvas -->
  <!-- Shield y=4..44 (40px native) × 1.5 = 60px rendered. Offset = (76-60)/2 = 8 -->
  <g transform="translate(0,8) scale(1.5)">
    <path d="M24 4L8 10V20C8 30 15 38 24 44C33 38 40 30 40 20V10L24 4Z"
      fill="url(#shieldGrad)" stroke="#00B4D8" stroke-width="1" stroke-linejoin="round"/>
    <circle cx="24" cy="22" r="2.5" fill="#FFFFFF"/>
    <circle cx="18" cy="14" r="1.8" fill="#A29BFE"/>
    <circle cx="30" cy="14" r="1.8" fill="#A29BFE"/>
    <circle cx="14" cy="22" r="1.8" fill="#A29BFE"/>
    <circle cx="34" cy="22" r="1.8" fill="#A29BFE"/>
    <circle cx="18" cy="30" r="1.8" fill="#00B4D8"/>
    <circle cx="30" cy="30" r="1.8" fill="#00B4D8"/>
    <line x1="18" y1="14" x2="24" y2="22" stroke="#A29BFE" stroke-width="1" opacity="0.6"/>
    <line x1="30" y1="14" x2="24" y2="22" stroke="#A29BFE" stroke-width="1" opacity="0.6"/>
    <line x1="14" y1="22" x2="24" y2="22" stroke="#A29BFE" stroke-width="1" opacity="0.6"/>
    <line x1="34" y1="22" x2="24" y2="22" stroke="#A29BFE" stroke-width="1" opacity="0.6"/>
    <line x1="24" y1="22" x2="18" y2="30" stroke="#00B4D8" stroke-width="1" opacity="0.6"/>
    <line x1="24" y1="22" x2="30" y2="30" stroke="#00B4D8" stroke-width="1" opacity="0.6"/>
  </g>
  <!-- Wordmark: x=80 (72px shield + 8px gap). Baseline y=46 centres text optically. -->
  <text x="80" y="46"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-weight="700" font-size="34" fill="#1E1E2F" letter-spacing="-1">Govena</text>
  <!-- Dual underline: 11px below baseline = y57. Purple then blue with 3px gap. -->
  <rect x="80"  y="57" width="58" height="3.5" rx="1.75" fill="#6C5CE7"/>
  <rect x="141" y="57" width="32" height="3.5" rx="1.75" fill="#00B4D8"/>
</svg>
